<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>YE ARCHIVE</title>
<meta property="og:title" content="YE ARCHIVE">
<meta property="og:description" content="A curated discography and unreleased archive.">
<meta property="og:image" content="assets/og-preview.jpg"> <meta property="og:type" content="website">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json"> <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #ffffff;
    --page-bg: #f4f4f5;
    --text: #111111;
    --muted: #666666;
    --border: #e4e4e7;
    --shadow: 0 4px 12px rgba(0,0,0,0.06);
    --radius: 4px; 
    --album-accent: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'IBM Plex Mono', monospace;
    background: var(--page-bg);
    color: var(--text);
    padding-bottom: 120px;
    -webkit-font-smoothing: antialiased;
  }

  /* --- HEADER & CAPSULE SEARCH --- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50; gap: 20px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  .logo {
    width: 40px; height: 40px; border-radius: 4px; background: #111; color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px;
  }
  header h1 { font-size: 14px; margin: 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

  .search-container { flex: 2; display: flex; justify-content: center; }
  .search-capsule {
    width: 100%; max-width: 500px; background: #eeeeee; border: 1px solid transparent;
    border-radius: 25px; padding: 10px 24px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
    outline: none; transition: all 0.2s; text-transform: uppercase;
  }
  .search-capsule:focus { background: #fff; border-color: #111; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }

  .header-actions { display: flex; gap: 8px; flex: 1; justify-content: flex-end; align-items: center; }
  .nav-btn {
    background: #fff; border: 1px solid var(--border); padding: 8px 14px; border-radius: 4px;
    font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'IBM Plex Mono', monospace;
    transition: all 0.2s; color: var(--text); text-transform: uppercase; display: flex; align-items: center; gap: 6px;
  }
  .nav-btn:hover { background: #f0f0f0; border-color: #111; }
  
  .surprise-btn { color: #555; }
  .surprise-btn svg { width: 14px; height: 14px; fill: #555; }

  /* --- MAIN CONTENT & GRIDS --- */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 18px; }
  .section-label { margin: 30px 0 20px; font-size: 16px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }

  .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 24px; }
  .album-card { cursor: pointer; transition: transform 0.2s ease; }
  .album-card:hover { transform: translateY(-4px); }
  .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: var(--radius); box-shadow: var(--shadow); object-fit: cover; margin-bottom: 12px; background: #eee; }
  .album-name { font-size: 13px; font-weight: 700; text-transform: uppercase; line-height: 1.2; }
  .album-year { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; }

  /* --- ALBUM VIEW OVERLAY --- */
  .album-view {
    position: fixed; inset: 0; background: #ffffff; color: var(--text); z-index: 80;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    overflow-y: auto; padding-bottom: 140px;
  }
  .album-view.show { transform: translateY(0); }
  .album-view-header {
    position: sticky; top: 0; background: rgba(255,255,255,0.95); padding: 16px 24px;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; backdrop-filter: blur(5px); z-index: 10;
  }
  .album-content { max-width: 1000px; margin: 0 auto; padding: 40px 24px; display: flex; gap: 50px; }
  .view-left { flex: 0 0 300px; }
  .view-cover { width: 100%; aspect-ratio: 1/1; border-radius: var(--radius); box-shadow: 0 12px 40px rgba(0,0,0,0.1); object-fit: cover; }
  .view-title { font-size: 24px; margin: 20px 0 6px; text-transform: uppercase; font-weight: 700; }
  .view-meta { color: var(--muted); font-size: 13px; font-weight: 600; text-transform: uppercase; }
  .view-notes { margin-top: 16px; font-size: 13px; line-height: 1.6; color: #555; }
  
  .download-album-btn {
    display: block; width: 100%; text-align: center; margin-top: 24px; background: #111; color: #fff;
    text-decoration: none; padding: 12px; border-radius: 4px; font-weight: 700; font-size: 12px;
    text-transform: uppercase; transition: opacity 0.2s;
  }
  .download-album-btn:hover { opacity: 0.8; }

  .view-right { flex: 1; }
  .track-list { list-style: none; padding: 0; margin: 0; }
  .track-item {
    display: flex; align-items: center; gap: 16px; padding: 12px 10px; border-bottom: 1px solid #f0f0f0;
    font-size: 13px; transition: background 0.1s; border-radius: 4px;
  }
  .track-item:hover { background: #f9f9f9; }
  .track-index { color: #999; width: 24px; text-align: right; font-weight: 600; }
  .track-title { flex: 1; font-weight: 500; color: #333; text-transform: uppercase; cursor: pointer; }
  .track-item.is-playing .track-title { color: #000; font-weight: 700; }
  
  .track-actions { display: flex; gap: 6px; }
  .action-icon-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 4px; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted);
    text-decoration: none; transition: all 0.2s; font-family: 'IBM Plex Mono', monospace; font-size: 14px;
  }
  .action-icon-btn:hover { border-color: #111; color: #111; }

  /* --- MINI PLAYER --- */
  .mini-player {
    position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: #ffffff;
    border-top: 1px solid #e5e5e5; box-shadow: 0 -4px 24px rgba(0,0,0,0.06);
    display: grid; grid-template-columns: 300px 1fr 300px; align-items: center; padding: 0 30px; z-index: 200;
    transform: translateY(100%); transition: transform 0.3s ease-out;
  }
  .mini-player.active { transform: translateY(0); }
  .mp-info { display: flex; align-items: center; gap: 16px; overflow: hidden; cursor: pointer; }
  .mp-cover { width: 56px; height: 56px; min-width: 56px; aspect-ratio: 1/1; border-radius: 4px; background: #eee; object-fit: cover; flex-shrink: 0; }
  .mp-text-container { overflow: hidden; white-space: nowrap; position: relative; width: 100%; mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%); }
  .mp-title-wrap { display: inline-block; }
  .mp-title { font-size: 13px; font-weight: 700; color: #111; text-transform: uppercase; }
  .mp-album-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

  .mp-center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .mp-controls { display: flex; align-items: center; gap: 24px; }
  .mp-btn { background: none; border: none; cursor: pointer; padding: 0; transition: transform 0.1s; opacity: 0.8; }
  .mp-btn:hover { opacity: 1; }
  .mp-btn svg { width: 22px; height: 22px; fill: #111; }
  .mp-btn-main { width: 40px; height: 40px; background: #111; border-radius: 50%; opacity: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
  .mp-btn-main svg { fill: #fff; width: 16px; height: 16px; margin-left: 1px; }

  .mp-progress-container { width: 100%; max-width: 400px; display: flex; align-items: center; gap: 10px; }
  .mp-time { font-size: 11px; color: #888; font-weight: 500; min-width: 35px; text-align: center; }
  input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
  input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { height: 12px; width: 12px; border-radius: 50%; background: #111; -webkit-appearance: none; margin-top: -4px; }
  
  .mp-right { display: flex; justify-content: flex-end; font-size: 11px; color: #999; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

  /* --- FULL SCREEN PLAYER --- */
  .full-player {
    position: fixed; inset: 0; z-index: 300; display: flex; flex-direction: column;
    padding: 20px 40px 40px; transform: translateY(100%); touch-action: none;
    background: linear-gradient(180deg, var(--album-accent) 0%, #ffffff 100%);
    transition: transform 0.4s cubic-bezier(0.32, 1, 0.23, 1), background 1.2s ease;
  }
  .full-player.active { transform: translateY(0); }
  .swipe-handle { width: 40px; height: 5px; background: rgba(0,0,0,0.08); border-radius: 10px; margin: 0 auto 20px; flex-shrink: 0; }
  .close-full { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.05); border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono'; font-weight: bold; }

  .full-cover { width: min(400px, 85%); aspect-ratio: 1/1; border-radius: 8px; margin: 0 auto 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); object-fit: cover; }

  @media (orientation: landscape) {
    .full-content { display: flex; align-items: center; justify-content: center; max-width: 1000px; margin: 60px auto 0; gap: 60px; width: 100%; }
    .full-cover { width: 350px; height: 350px; margin: 0; }
    .full-info { text-align: left; flex: 1; }
    .full-info h2 { font-size: 56px; margin: 0; font-weight: 800; text-transform: uppercase; line-height: 1; }
    .full-info p { font-size: 18px; color: #666; margin: 12px 0 40px; font-weight: 600; text-transform: uppercase; }
    .full-controls { justify-content: flex-start; gap: 40px; }
  }

  @media (orientation: portrait) {
    .full-player { padding: 20px 30px 80px; align-items: center; justify-content: space-between; }
    .full-content { width: 100%; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .full-info h2 { font-size: 28px; text-transform: uppercase; font-weight: 700; margin: 0; }
    .full-info p { font-size: 16px; color: #666; margin: 8px 0 40px; text-transform: uppercase; font-weight: 600; }
    .full-controls { justify-content: center; gap: 40px; }
  }

  .full-controls { display: flex; align-items: center; gap: 45px; }
  .full-btn-main { background: #111; width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
  .full-btn-main svg { fill: #fff; width: 32px; }
  .full-btn { background: none; border: none; cursor: pointer; }
  .full-btn svg { width: 34px; height: 34px; fill: #111; }

  /* Modals */
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 300; }
  .backdrop.show { display: flex; }
  .modal { width: min(500px, 90%); background: #fff; border-radius: 8px; padding: 24px; position: relative; border: 1px solid #111; }

  @media(max-width: 800px) {
    .header-actions span { display: none; }
    .album-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .album-content { flex-direction: column; padding-top: 10px; gap: 20px; }
    .view-left { width: 100%; text-align: center; }
    .view-cover { width: 220px; margin: 0 auto; }
    .mini-player { grid-template-columns: 1fr auto; height: auto; padding: 12px 16px; gap: 12px; }
    .mp-info { max-width: 180px; }
    .mp-right { display: none; }
    .mp-center { grid-column: 1 / -1; width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">:)</div>
    <h1>YE ARCHIVE</h1>
  </div>
  
  <div class="search-container">

  </div>

  <div class="header-actions">

      <span>SURPRISE ME</span>
    </button>
    <button class="nav-btn" onclick="openBlog('THE MAIN GOAL', 'Making the vault accessible. Built so the unreleased vision is organized and available for everyone. Less time searching, more time listening.')">THE VISION</button> 
  </div>
</header>

<main>
  <div id="searchUI" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 class="section-label" style="margin:0;">SEARCH RESULTS</h2>
      <button class="nav-btn" onclick="closeSearch()">CLOSE [X]</button>
    </div>
    <div class="album-grid" id="searchGrid"></div>
  </div>

  <div id="defaultUI">
    <h2 class="section-label">THE COLLECTION</h2>
    <div class="album-grid" id="albumGrid"></div>
  </div>
</main>

<div id="albumView" class="album-view">

    <button class="nav-btn" onclick="closeAlbum()">← BACK TO COLLECTION</button>
  </div>
  <div class="album-content">
    <div class="view-left">
      <img id="viewCover" class="view-cover" src="">
      <h2 id="viewTitle" class="view-title"></h2>
      <p id="viewMeta" class="view-meta"></p>
      <p id="viewNotes" class="view-notes"></p>
      <a id="albumDownload" class="download-album-btn" href="#" download>DOWNLOAD ALBUM (.ZIP)</a>
    </div>
    <div class="view-right">
      <ul id="trackList" class="track-list"></ul>
    </div>
  </div>
</div>

<div id="miniPlayer" class="mini-player">
  <div class="mp-info" onclick="toggleFullPlayer()">
    <img id="mpCover" class="mp-cover" src="">
    <div class="mp-text-container" id="mpTextContainer">
      <div class="mp-title-wrap" id="mpTitleWrap">
        <span id="mpTitle" class="mp-title">Select a song</span>
      </div>
      <div id="mpAlbum" class="mp-album-label"></div>
    </div>
  </div>
  <div class="mp-center">
    <div class="mp-controls">
      <button class="mp-btn" onclick="playNextCmd(true)"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="mp-btn mp-btn-main" onclick="togglePlay()">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="mp-btn" onclick="playNextCmd(false)"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
    <div class="mp-progress-container">
      <span class="mp-time" id="currentTime">0:00</span>
      <input type="range" id="progressBar" value="0" min="0" max="100">
      <span class="mp-time" id="duration">0:00</span>
    </div>
  </div>
  <div class="mp-right">KanYeWest</div> 
</div>

<div id="fullPlayer" class="full-player">
  <div class="swipe-handle"></div>
  <button class="close-full" onclick="toggleFullPlayer()">✕</button>
  <div class="full-content">
    <img id="fullCover" class="full-cover" src="">
    <div class="full-info">
      <h2 id="fullTitle">...</h2>
      <p id="fullAlbum">ALBUM</p>
      <div style="margin-bottom: 30px; width: 100%;">
        <input type="range" id="fullProgressBar" value="0" style="width: 100%;">
        <div style="display: flex; justify-content: space-between; font-size: 13px; color: #aaa; margin-top: 10px; font-weight: 600;">
          <span id="fullCurrentTime">0:00</span>
          <span id="fullDuration">0:00</span>
        </div>
      </div>
      <div class="full-controls">
        <button class="full-btn" onclick="playNextCmd(true)"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="full-btn full-btn-main" onclick="togglePlay()">
          <svg id="fullIconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="fullIconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="full-btn" onclick="playNextCmd(false)"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      </div>
    </div>
  </div>
</div>

<audio id="globalAudio"></audio>

<div class="backdrop" id="blogBackdrop">
  <div class="modal">
    <button class="close-modal" onclick="document.getElementById('blogBackdrop').classList.remove('show')">✕</button>
    <h2 id="blogTitle" style="margin-top:0; text-transform:uppercase;"></h2>
    <p id="blogContent" style="line-height:1.6; color:#444;"></p>
  </div>
</div>

// --- STATE ---
let activePlaylistIndex = -1, activeTrackIndex = -1, viewingPlaylistIndex = -1;
let currentTerm = "";
let queue = [];

const audio = document.getElementById('globalAudio');
const albumGrid = document.getElementById('albumGrid');

// Init Grid
albums.forEach((alb, i) => {
  const div = document.createElement('div');
  div.className = 'album-card';
  div.innerHTML = `<img src="${alb.cover}"><div class="album-name">${alb.title}</div><div class="album-year">${alb.year}</div>`;
  div.onclick = () => openAlbum(i);
  albumGrid.appendChild(div);
});

// --- QUEUE LOGIC ---
function addToQueue(pIdx, tIdx, btnElement) {
  queue.push({ pIdx, tIdx });
  btnElement.textContent = '✓';
  btnElement.style.borderColor = '#111';
  btnElement.style.color = '#111';
  setTimeout(() => {
    btnElement.textContent = '+';
    btnElement.style.borderColor = '';
    btnElement.style.color = '';
  }, 1000);
}

function playNextCmd(isPrev) {
  if (activePlaylistIndex === -1) return;
  if (!isPrev && queue.length > 0) {
    const nextItem = queue.shift();
    playSong(nextItem.pIdx, nextItem.tIdx);
  } else {
    const pl = playlists[activePlaylistIndex];
    let nextIdx = isPrev ? activeTrackIndex - 1 : activeTrackIndex + 1;
    if (nextIdx >= pl.songs.length) nextIdx = 0;
    if (nextIdx < 0) nextIdx = pl.songs.length - 1;
    playSong(activePlaylistIndex, nextIdx);
  }
}
audio.onended = () => playNextCmd(false);

// --- PLAYBACK ---
function playSong(pIdx, tIdx) {
  activePlaylistIndex = pIdx; activeTrackIndex = tIdx;
  const song = playlists[pIdx].songs[tIdx];
  const alb = albums.find(a => a.playlistIndex === pIdx);
  document.documentElement.style.setProperty('--album-accent', alb.accent || '#ffffff');
  audio.src = song.file;
  audio.play();
  document.getElementById('miniPlayer').classList.add('active');
  document.getElementById('mpCover').src = alb.cover;
  document.getElementById('mpTitle').textContent = song.title;
  document.getElementById('mpAlbum').textContent = alb.title;
  updatePlayPauseUI(true);
  if(viewingPlaylistIndex === pIdx) renderTrackList();
}

function togglePlay() { 
  if(audio.paused) { audio.play(); updatePlayPauseUI(true); } 
  else { audio.pause(); updatePlayPauseUI(false); }
}

function updatePlayPauseUI(playing) {
  document.getElementById('iconPlay').style.display = playing ? 'none' : 'block';
  document.getElementById('iconPause').style.display = playing ? 'block' : 'none';
  document.getElementById('fullIconPlay').style.display = playing ? 'none' : 'block';
  document.getElementById('fullIconPause').style.display = playing ? 'block' : 'none';
}

function playSurpriseTrack() {
  const rP = Math.floor(Math.random() * playlists.length);
  const rT = Math.floor(Math.random() * playlists[rP].songs.length);
  playSong(rP, rT);
}

// --- UI VIEWS ---
function openAlbum(i) {
  viewingPlaylistIndex = albums[i].playlistIndex;
  document.getElementById('viewCover').src = albums[i].cover;
  document.getElementById('viewTitle').textContent = albums[i].title;
  document.getElementById('viewMeta').textContent = albums[i].year;
  document.getElementById('viewNotes').textContent = albums[i].notes;
  document.getElementById('albumDownload').href = `music/${albums[i].title}/${albums[i].title}.zip`;
  renderTrackList();
  document.getElementById('albumView').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeAlbum() { 
  document.getElementById('albumView').classList.remove('show');
  document.body.style.overflow = '';
}

function renderTrackList() {
  const list = document.getElementById('trackList');
  list.innerHTML = '';
  playlists[viewingPlaylistIndex].songs.forEach((s, i) => {
    const li = document.createElement('li');
    li.className = 'track-item' + (activePlaylistIndex===viewingPlaylistIndex && activeTrackIndex===i ? ' is-playing' : '');
    li.innerHTML = `
      <span class="track-index">${i + 1}</span>
      <span class="track-title" onclick="playSong(${viewingPlaylistIndex}, ${i})">${s.title}</span>
      <div class="track-actions">
        <button class="action-icon-btn" title="Add to Queue" onclick="addToQueue(${viewingPlaylistIndex}, ${i}, this)">+</button>
        <a class="action-icon-btn" href="${s.file}" download title="Download Track">↓</a>
      </div>
    `;
    list.appendChild(li);
  });
}

function toggleFullPlayer() {
  const fp = document.getElementById('fullPlayer');
  if (fp.classList.toggle('active') && activePlaylistIndex !== -1) {
    const song = playlists[activePlaylistIndex].songs[activeTrackIndex];
    const alb = albums.find(a => a.playlistIndex === activePlaylistIndex);
    document.getElementById('fullCover').src = alb.cover;
    document.getElementById('fullTitle').textContent = song.title;
    document.getElementById('fullAlbum').textContent = alb.title;
  }
}

// ---SEARCH & TIME UPDATES ---
const searchInput = document.getElementById('searchInput');
searchInput.oninput = (e) => { currentTerm = e.target.value.toLowerCase().trim(); execSearch(); };

function closeSearch() {
  searchInput.value = "";
  currentTerm = "";
  execSearch();
}

function execSearch() {
  const searchUI = document.getElementById('searchUI');
  const defaultUI = document.getElementById('defaultUI');
  const searchGrid = document.getElementById('searchGrid');

  if (!currentTerm) { 
    searchUI.style.display = "none"; 
    defaultUI.style.display = "block"; 
    return; 
  }
  
  searchUI.style.display = "block"; 
  defaultUI.style.display = "none"; 
  searchGrid.innerHTML = "";

  // Albums Search
  albums.forEach((alb, index) => {
    if (alb.title.toLowerCase().includes(currentTerm)) {
      const div = document.createElement('div');
      div.className = 'album-card';
      div.innerHTML = `<img src="${alb.cover}"><div class="album-name">${alb.title}</div><div class="album-year">ALBUM • ${alb.year}</div>`;
      div.onclick = () => { closeSearch(); openAlbum(index); };
      searchGrid.appendChild(div);
    }
  });

  // Tracks Search
  playlists.forEach((pl, plIdx) => {
    pl.songs.forEach((song, sIdx) => {
      if (song.title.toLowerCase().includes(currentTerm)) {
        const alb = albums.find(a => a.playlistIndex === plIdx);
        const div = document.createElement('div');
        div.className = 'album-card';
        div.innerHTML = `<img src="${alb ? alb.cover : ''}"><div class="album-name">${song.title}</div><div class="album-year">TRACK • ${pl.title}</div>`;
        div.onclick = () => playSong(plIdx, sIdx);
        searchGrid.appendChild(div);
      }
    });
  });

  if (searchGrid.innerHTML === "") {
    searchGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999; font-weight: 600;">NO RESULTS FOUND</div>`;
  }
}

audio.ontimeupdate = () => {
  if(!isNaN(audio.duration)) {
    const prog = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressBar').value = prog;
    document.getElementById('fullProgressBar').value = prog;
    const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    document.getElementById('currentTime').textContent = fmt(audio.currentTime);
    document.getElementById('duration').textContent = fmt(audio.duration);
    document.getElementById('fullCurrentTime').textContent = fmt(audio.currentTime);
    document.getElementById('fullDuration').textContent = fmt(audio.duration);
  }
};

document.getElementById('progressBar').oninput = e => audio.currentTime = (e.target.value/100) * audio.duration;
document.getElementById('fullProgressBar').oninput = e => audio.currentTime = (e.target.value/100) * audio.duration;

// --- KEYBOARD & GESTURES ---
window.addEventListener('keydown', (e) => {
  if (document.activeElement.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); if(activePlaylistIndex !== -1) togglePlay(); break;
    case 'ArrowRight': audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); break;
    case 'ArrowLeft': audio.currentTime = Math.max(0, audio.currentTime - 5); break;
    case 'KeyM': audio.muted = !audio.muted; break;
    case 'Escape': 
      if (document.getElementById('fullPlayer').classList.contains('active')) toggleFullPlayer();
      else if (document.getElementById('albumView').classList.contains('show')) closeAlbum();
      break;
  }
});

let touchStartY = 0;
const fp = document.getElementById('fullPlayer');
fp.addEventListener('touchstart', e => { touchStartY = e.changedTouches[0].screenY; }, { passive: true });
fp.addEventListener('touchmove', e => {
  let deltaY = e.changedTouches[0].screenY - touchStartY;
  if (deltaY > 0) { fp.style.transform = `translateY(${deltaY}px)`; fp.style.transition = 'none'; }
}, { passive: true });
fp.addEventListener('touchend', e => {
  let deltaY = e.changedTouches[0].screenY - touchStartY;
  fp.style.transition = 'transform 0.4s cubic-bezier(0.32, 1, 0.23, 1)';
  if (deltaY > 100) { toggleFullPlayer(); fp.style.transform = ''; } 
  else { fp.style.transform = 'translateY(0)'; }
}, { passive: true });

function openBlog(t, c) {
  document.getElementById('blogTitle').textContent = t;
  document.getElementById('blogContent').textContent = c;
  document.getElementById('blogBackdrop').classList.add('show');
}
